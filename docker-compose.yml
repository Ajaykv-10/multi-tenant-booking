
services:
  postgres:
    image: postgres:15
    container_name: booking_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: booking_engine
    ports:
      - "5432:5432"
    volumes:
      - booking_data:/var/lib/postgresql/data

volumes:
  booking_data: